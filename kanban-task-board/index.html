<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Task Board</title>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="flex justify-between items-center p-6 bg-white shadow-sm">
    <div id="app" class="text-2xl font-semibold text-slate-900">Kanban Task Board</div>
    <button
      class="rounded-full bg-slate-200 px-4 py-3 text-lg font-semibold text-slate-800 hover:bg-slate-300 transition">
      +
    </button>
  </header>

  <main class="p-6">
    <div class="grid gap-6 md:grid-cols-3">
      <section class="rounded-[2rem] bg-white p-6 shadow-sm border border-rose-100">
        <h2 class="mb-4 text-lg font-semibold text-rose-700">To-Do</h2>
        <div class="space-y-4 to-do">
          <div class="rounded-3xl bg-rose-50 p-4 text-rose-900 shadow-sm ">Example task</div>
        </div>
      </section>

      <section class="rounded-[2rem] bg-white p-6 shadow-sm border border-amber-100">
        <h2 class="mb-4 text-lg font-semibold text-amber-700">Doing</h2>
        <div class="space-y-4">
          <div class="rounded-3xl bg-amber-50 p-4 text-amber-900 shadow-sm ">Example task</div>
        </div>
      </section>

      <section class="rounded-[2rem] bg-white p-6 shadow-sm border border-teal-100">
        <h2 class="mb-4 text-lg font-semibold text-teal-700">Done</h2>
        <div class="space-y-4">
          <div class="rounded-3xl bg-teal-50 p-4 text-teal-900 shadow-sm">Example task</div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
